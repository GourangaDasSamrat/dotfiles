version: 1
git_protocol: https
editor:
prompt: enabled
prefer_editor_prompt: disabled
pager:
aliases:
    co: pr checkout
    prs: '!gh pr list --author "@me" --state all --json "title,url,updatedAt" --jq ".[] | \"\u001b[38;5;84m\(.title)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;242m\(.url)\u001b[0m\""'
    open: repo view --web

    # Commits with timestamps
    today: |
        !gh search commits --author="@me" --committer-date="$(date +%Y-%m-%d)" --json "repository,commit" --jq 'sort_by(.commit.author.date) | .[] | "\u001b[38;5;117m[\(.commit.author.date[11:16])]\u001b[0m \u001b[38;5;141m\(.repository.fullName)\u001b[0m ➜ \u001b[38;5;84m\(.commit.message)\u001b[0m"'
    yesterday: |
        !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then YD=$(date -v-1d +%Y-%m-%d); else YD=$(date -d "yesterday" +%Y-%m-%d); fi; gh search commits --author="@me" --committer-date="$YD" --json "repository,commit" --jq "sort_by(.commit.author.date) | .[] | \"\u001b[38;5;117m[\(.commit.author.date[11:16])]\u001b[0m \u001b[38;5;141m\(.repository.fullName)\u001b[0m ➜ \u001b[38;5;84m\(.commit.message)\u001b[0m\""'

    # Repo-wise summary and total counts
    today-summary: |
        !bash -c 'DATA=$(gh search commits --author="@me" --committer-date="$(date +%Y-%m-%d)" --json "repository" --jq "group_by(.repository.fullName) | .[] | {repo: .[0].repository.fullName, count: length}"); echo "$DATA" | jq -r "\"\\u001b[38;5;141m➜ \\(.repo)\\u001b[0m \\u001b[38;5;117m➜\\u001b[0m \\u001b[38;5;84m\\(.count) commits\\u001b[0m\""; TOTAL=$(echo "$DATA" | jq -s "map(.count) | add // 0"); echo -e "\n\033[38;5;141mTotal Commits Today:\033[0m \033[38;5;84m$TOTAL\033[0m"'
    yesterday-summary: |
        !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then YD=$(date -v-1d +%Y-%m-%d); else YD=$(date -d "yesterday" +%Y-%m-%d); fi; DATA=$(gh search commits --author="@me" --committer-date="$YD" --json "repository" --jq "group_by(.repository.fullName) | .[] | {repo: .[0].repository.fullName, count: length}"); echo "$DATA" | jq -r "\"\\u001b[38;5;141m➜ \\(.repo)\\u001b[0m \\u001b[38;5;117m➜\\u001b[0m \\u001b[38;5;84m\\(.count) commits\\u001b[0m\""; TOTAL=$(echo "$DATA" | jq -s "map(.count) | add // 0"); echo -e "\n\033[38;5;141mTotal Commits Yesterday:\033[0m \033[38;5;84m$TOTAL\033[0m"'
    last-month-summary: |
        !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then S=$(date -v-1m +%Y-%m-01); E=$(date -v-1m -v+1m -v-1d +%Y-%m-%d); else S=$(date -d "last month" +%Y-%m-01); E=$(date -d "$S +1 month -1 day" +%Y-%m-%d); fi; echo -e "\033[38;5;141mSummary for: $(date -d "$S" "+%B %Y" 2>/dev/null || date -jf %Y-%m-%d "$S" "+%B %Y")\033[0m\n"; DATA=$(gh search commits --author="@me" --committer-date="$S..$E" --json "repository" --limit 1000 --jq "group_by(.repository.fullName) | sort_by(length) | reverse | .[] | {repo: .[0].repository.fullName, count: length}"); echo "$DATA" | jq -r "\"\\u001b[38;5;141m➜ \\(.repo)\\u001b[0m \\u001b[38;5;117m➜\\u001b[0m \\u001b[38;5;84m\\(.count) commits\\u001b[0m\""; TOTAL=$(echo "$DATA" | jq -s "map(.count) | add // 0"); echo -e "\n\033[38;5;141mTotal Commits in Month:\033[0m \033[38;5;84m$TOTAL\033[0m"'

    # Contribution streaks
    streak: |
        !gh api graphql -f query="query { viewer { contributionsCollection { contributionCalendar { weeks { contributionDays { contributionCount date } } } } } }" --jq "[.data.viewer.contributionsCollection.contributionCalendar.weeks[].contributionDays[]] | reverse | {current: 0, longest: 0, temp: 0, found_current: false} as \$init | reduce .[] as \$day (\$init; if \$day.contributionCount > 0 then .temp += 1 | (if .found_current == false then .current = .temp else . end) | (if .temp > .longest then .longest = .temp else . end) else (if .temp > 0 then .found_current = true end) | .temp = 0 end) | \"\u001b[38;5;141mCurrent Streak: \u001b[38;5;84m\(.current) days\u001b[0m\n\u001b[38;5;141mLongest Streak: \u001b[38;5;117m\(.longest) days\u001b[0m\""

http_unix_socket:
browser:
color_labels: enabled
accessible_colors: disabled
accessible_prompter: disabled
spinner: enabled

