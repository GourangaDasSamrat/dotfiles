version: 1
git_protocol: https
editor:
prompt: enabled
prefer_editor_prompt: disabled
pager:
aliases:
  # --- General Shortcuts ---
  co: pr checkout
  prs: '!gh pr list --author "@me" --state all --json "title,url,updatedAt" --jq ".[] | \"\u001b[38;5;84m\(.title)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;242m\(.url)\u001b[0m\""'
  open: repo view --web

  # --- Present (Current Activity) ---
  today: |
    !gh search commits --author="@me" --committer-date="$(date +%Y-%m-%d)" --json "repository,commit" --jq 'sort_by(.commit.author.date) | .[] | "\u001b[38;5;117m[\(.commit.author.date[11:16])]\u001b[0m \u001b[38;5;141m\(.repository.fullName)\u001b[0m ➜ \u001b[38;5;84m\(.commit.message)\u001b[0m"'
  today-summary: |
    !bash -c 'DATA=$(gh search commits --author="@me" --committer-date="$(date +%Y-%m-%d)" --json "repository" --jq "group_by(.repository.fullName) | .[] | {repo: .[0].repository.fullName, count: length}"); echo "$DATA" | jq -r "\"\\u001b[38;5;141m➜ \\(.repo)\\u001b[0m \\u001b[38;5;117m➜\\u001b[0m \\u001b[38;5;84m\\(.count) commits\\u001b[0m\""; TOTAL=$(echo "$DATA" | jq -s "map(.count) | add // 0"); echo -e "\n\u001b[38;5;141mTotal Commits Today:\u001b[0m \u001b[38;5;84m$TOTAL\u001b[0m"'
  today-stats: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-%m-%dT00:00:00Z)'") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }' --jq '.data.viewer.contributionsCollection | "\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m", "\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m", "\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m", "\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m", "\n\u001b[38;5;117mTotal Contributions (Today): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m"'
  this-month-summary: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-%m-01T00:00:00Z)'") { totalCommitContributions commitContributionsByRepository(maxRepositories: 100) { repository { nameWithOwner } contributions { totalCount } } } } }' --jq '.data.viewer.contributionsCollection | (.commitContributionsByRepository | sort_by(.contributions.totalCount) | reverse | .[] | "\u001b[38;5;141m➜ \(.repository.nameWithOwner)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;84m\(.contributions.totalCount) commits\u001b[0m"), "\n\u001b[38;5;141mTotal Commits this Month:\u001b[0m \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m"'
  this-month-stats: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-%m-01T00:00:00Z)'") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }' --jq '.data.viewer.contributionsCollection | "\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m", "\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m", "\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m", "\u001b[38;5;141mNew Repos: \u001b[38;5;84m\(.totalRepositoryContributions)\u001b[0m", "\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m", "\n\u001b[38;5;117mTotal Contributions (Month): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m"'
  this-year-summary: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-01-01T00:00:00Z)'") { totalCommitContributions commitContributionsByRepository(maxRepositories: 100) { repository { nameWithOwner } contributions { totalCount } } } } }' --jq '.data.viewer.contributionsCollection | (.commitContributionsByRepository | sort_by(.contributions.totalCount) | reverse | .[] | "\u001b[38;5;141m➜ \(.repository.nameWithOwner)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;84m\(.contributions.totalCount) commits\u001b[0m"), "\n\u001b[38;5;141mTotal Commits this Year:\u001b[0m \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m"'
  this-year-stats: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-01-01T00:00:00Z)'") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }' --jq '.data.viewer.contributionsCollection | "\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m", "\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m", "\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m", "\u001b[38;5;141mNew Repos: \u001b[38;5;84m\(.totalRepositoryContributions)\u001b[0m", "\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m", "\n\u001b[38;5;117mTotal Contributions (Year): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m"'

  # --- Past (Historical Activity) ---
  yesterday: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then YD=$(date -v-1d +%Y-%m-%d); else YD=$(date -d "yesterday" +%Y-%m-%d); fi; gh search commits --author="@me" --committer-date="$YD" --json "repository,commit" --jq "sort_by(.commit.author.date) | .[] | \"\u001b[38;5;117m[\(.commit.author.date[11:16])]\u001b[0m \u001b[38;5;141m\(.repository.fullName)\u001b[0m ➜ \u001b[38;5;84m\(.commit.message)\u001b[0m\""'
  yesterday-summary: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then YD=$(date -v-1d +%Y-%m-%d); else YD=$(date -d "yesterday" +%Y-%m-%d); fi; DATA=$(gh search commits --author="@me" --committer-date="$YD" --json "repository" --jq "group_by(.repository.fullName) | .[] | {repo: .[0].repository.fullName, count: length}"); echo "$DATA" | jq -r "\"\\u001b[38;5;141m➜ \\(.repo)\\u001b[0m \\u001b[38;5;117m➜\\u001b[0m \\u001b[38;5;84m\\(.count) commits\\u001b[0m\""; TOTAL=$(echo "$DATA" | jq -s "map(.count) | add // 0"); echo -e "\n\u001b[38;5;141mTotal Commits Yesterday:\u001b[0m \u001b[38;5;84m$TOTAL\033[0m"'
  yesterday-stats: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then YD=$(date -v-1d +%Y-%m-%d); else YD=$(date -d "yesterday" +%Y-%m-%d); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${YD}T00:00:00Z\", to: \"${YD}T23:59:59Z\") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }" --jq ".data.viewer.contributionsCollection | \"\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m\", \"\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m\", \"\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m\", \"\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m\", \"\n\u001b[38;5;117mTotal Contributions (Yesterday): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m\""'
  last-month-summary: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then S=$(date -v-1m +%Y-%m-01); E=$(date -v-1m -v+1m -v-1d +%Y-%m-%d); else S=$(date -d "last month" +%Y-%m-01); E=$(date -d "$S +1 month -1 day" +%Y-%m-%d); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${S}T00:00:00Z\", to: \"${E}T23:59:59Z\") { totalCommitContributions commitContributionsByRepository(maxRepositories: 100) { repository { nameWithOwner } contributions { totalCount } } } } }" --jq ".data.viewer.contributionsCollection | (.commitContributionsByRepository | sort_by(.contributions.totalCount) | reverse | .[] | \"\u001b[38;5;141m➜ \(.repository.nameWithOwner)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;84m\(.contributions.totalCount) commits\u001b[0m\"), \"\n\u001b[38;5;141mTotal Commits in Month:\u001b[0m \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m\""'
  last-month-stats: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then S=$(date -v-1m +%Y-%m-01); E=$(date -v-1m -v+1m -v-1d +%Y-%m-%d); else S=$(date -d "last month" +%Y-%m-01); E=$(date -d "$S +1 month -1 day" +%Y-%m-%d); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${S}T00:00:00Z\", to: \"${E}T23:59:59Z\") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }" --jq ".data.viewer.contributionsCollection | \"\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m\", \"\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m\", \"\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m\", \"\u001b[38;5;141mNew Repos: \u001b[38;5;84m\(.totalRepositoryContributions)\u001b[0m\", \"\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m\", \"\n\u001b[38;5;117mTotal Contributions (Last Month): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m\""'
  last-year-summary: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then LY=$(( $(date +%Y) - 1 )); else LY=$(date -d "last year" +%Y); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${LY}-01-01T00:00:00Z\", to: \"${LY}-12-31T23:59:59Z\") { totalCommitContributions commitContributionsByRepository(maxRepositories: 100) { repository { nameWithOwner } contributions { totalCount } } } } }" --jq ".data.viewer.contributionsCollection | (.commitContributionsByRepository | sort_by(.contributions.totalCount) | reverse | .[] | \"\u001b[38;5;141m➜ \(.repository.nameWithOwner)\u001b[0m \u001b[38;5;117m➜\u001b[0m \u001b[38;5;84m\(.contributions.totalCount) commits\u001b[0m\"), \"\n\u001b[38;5;141mTotal Commits in Year:\u001b[0m \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m\""'
  last-year-stats: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then LY=$(( $(date +%Y) - 1 )); else LY=$(date -d "last year" +%Y); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${LY}-01-01T00:00:00Z\", to: \"${LY}-12-31T23:59:59Z\") { totalCommitContributions totalPullRequestContributions totalIssueContributions totalRepositoryContributions restrictedContributionsCount } } }" --jq ".data.viewer.contributionsCollection | \"\u001b[38;5;141mCommits: \u001b[38;5;84m\(.totalCommitContributions)\u001b[0m\", \"\u001b[38;5;141mPRs: \u001b[38;5;84m\(.totalPullRequestContributions)\u001b[0m\", \"\u001b[38;5;141mIssues: \u001b[38;5;84m\(.totalIssueContributions)\u001b[0m\", \"\u001b[38;5;141mNew Repos: \u001b[38;5;84m\(.totalRepositoryContributions)\u001b[0m\", \"\u001b[38;5;141mPrivate: \u001b[38;5;84m\(.restrictedContributionsCount)\u001b[0m\", \"\n\u001b[38;5;117mTotal Contributions (Last Year): \u001b[38;5;84m\(.totalCommitContributions + .totalPullRequestContributions + .totalIssueContributions + .totalRepositoryContributions + .restrictedContributionsCount)\u001b[0m\""'

  # --- Insights & Streak ---
  this-year-languages: |
    !gh api graphql -f query='query { viewer { contributionsCollection(from: "'$(date +%Y-01-01T00:00:00Z)'") { commitContributionsByRepository(maxRepositories: 100) { repository { languages(first: 5, orderBy: {field: SIZE, direction: DESC}) { edges { size node { name } } } } } } } }' --jq '[.data.viewer.contributionsCollection.commitContributionsByRepository[].repository.languages.edges[] | {name: .node.name, size: .size}] | group_by(.name) | map({name: .[0].name, total: map(.size) | add}) | sort_by(.total) | reverse | .[:5] | .[] | "\u001b[38;5;141m➜ \(.name)\u001b[0m: \u001b[38;5;84m\(.total) bytes of code\u001b[0m"'
  last-year-languages: |
    !bash -c 'if [[ "$OSTYPE" == "darwin"* ]]; then LY=$(( $(date +%Y) - 1 )); else LY=$(date -d "last year" +%Y); fi; gh api graphql -f query="query { viewer { contributionsCollection(from: \"${LY}-01-01T00:00:00Z\", to: \"${LY}-12-31T23:59:59Z\") { commitContributionsByRepository(maxRepositories: 100) { repository { languages(first: 5, orderBy: {field: SIZE, direction: DESC}) { edges { size node { name } } } } } } } }" --jq "[.data.viewer.contributionsCollection.commitContributionsByRepository[].repository.languages.edges[] | {name: .node.name, size: .size}] | group_by(.name) | map({name: .[0].name, total: map(.size) | add}) | sort_by(.total) | reverse | .[:5] | .[] | \"\u001b[38;5;141m➜ \(.name)\u001b[0m: \u001b[38;5;84m\(.total) bytes of code\u001b[0m\""'
  streak: |
    !gh api graphql -f query="query { viewer { contributionsCollection { contributionCalendar { weeks { contributionDays { contributionCount date } } } } } }" --jq "[.data.viewer.contributionsCollection.contributionCalendar.weeks[].contributionDays[]] | reverse | {current: 0, longest: 0, temp: 0, found_current: false} as \$init | reduce .[] as \$day (\$init; if \$day.contributionCount > 0 then .temp += 1 | (if .found_current == false then .current = .temp else . end) | (if .temp > .longest then .longest = .temp else . end) else (if .temp > 0 then .found_current = true end) | .temp = 0 end) | \"\u001b[38;5;141mCurrent Streak: \u001b[38;5;84m\(.current) days\u001b[0m\n\u001b[38;5;141mLongest Streak: \u001b[38;5;117m\(.longest) days\u001b[0m\""

http_unix_socket:
browser:
color_labels: enabled
accessible_colors: disabled
accessible_prompter: disabled
spinner: enabled
