# BEGIN_KITTY_THEME
# Dracula
include current-theme.conf
# END_KITTY_THEME

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

term xterm-256color

window_padding_width 10

background_opacity 0.95
background_blur 20

hide_window_decorations titlebar-and-corners

macos_option_as_alt both