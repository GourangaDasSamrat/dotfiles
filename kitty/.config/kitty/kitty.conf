# Theme inclusion
include current-theme.conf

# Font configuration
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Terminal identity
# Set a standard terminal type for compatibility with apps that rely on TERM.
term xterm-256color

# Window appearance
window_padding_width 10
background_opacity 0.90
background_blur 20
hide_window_decorations titlebar-and-corners

# macOS behavior
# Treat the option key as Alt on macOS systems.
macos_option_as_alt both

# Mouse and URL handling
# Ctrl+Left Click opens URLs; plain left click avoids accidental URL activation.
mouse_map ctrl+left click ungrabbed mouse_handle_click selection link
mouse_map left click ungrabbed discard_event

# URL styling and detection
url_style curly
open_url_with default
detect_urls yes

# Layout configuration
# Enable the most useful window layouts for tiling and splitting.
enabled_layouts splits, stack, tall, grid

# Key mappings
# Use F5/F6 to open new horizontal or vertical splits explicitly.
map F5 launch --location=vsplit
map F6 launch --location=hsplit

# Quick tab navigation
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9